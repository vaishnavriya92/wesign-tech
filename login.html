<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #667eea, #764ba2);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
.card {
  border-radius: 15px;
}
</style>
</head>

<body>

<div class="card p-4 shadow" style="width: 350px;">
<h3 class="text-center mb-3">Login</h3>

<form id="loginForm">
  <input type="text" id="username" class="form-control mb-3" placeholder="Username" required>
  <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

  <button type="submit" class="btn btn-primary w-100">Login</button>
</form>

<p id="error" class="text-danger text-center mt-2"></p>
<p class="text-center mt-2">
  Don't have an account? <a href="signup.html">Sign Up</a>
</p>
</div>

<!-- ✅ load JS AFTER HTML -->
<script src="auth.js"></script>

<!-- ✅ optional safety: if already logged in -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  if (localStorage.getItem("isLoggedIn") === "true") {
    window.location.href = "index.html";
  }
});
</script>

</body>
</html>
