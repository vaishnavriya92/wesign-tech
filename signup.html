<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="card p-4 shadow" style="width:350px;">
<h3 class="text-center mb-3">Sign Up</h3>

<form id="signupForm">
<input type="text" id="newUser" class="form-control mb-2" placeholder="Username" required>
<input type="password" id="newPass" class="form-control mb-2" placeholder="Password" required>

<select id="role" class="form-control mb-3">
<option value="user">User</option>
<option value="admin">Admin</option>
</select>

<button class="btn btn-success w-100">Register</button>
</form>

<p id="msg" class="text-center mt-2"></p>

</div>

<script src="auth.js"></script>

</body>
</html>
